trigger:
  branches:
    include:
      - main
      - demo/*

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
  - task: UseDotNet@2
    inputs:
      packageType: sdk
      version: 9.0.x
  - script: dotnet test cerbi-undeniable-demo.sln --configuration Release
    displayName: Build and test demo
  - bash: |
      set -euo pipefail
      echo "Cerbi Scanner: verifying unsafe sample fails"
      if rg -n --pcre2 "(?i)([A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}|Bearer\s+[A-Z0-9._~+\/-]+|\b\d{3}-\d{2}-\d{4}\b|customerId)" src/UnsafeApi; then
        echo "Cerbi Scanner blocked unsafe logging sample as expected."
      else
        echo "Unsafe sample did not produce expected findings."
        exit 1
      fi

      echo "Cerbi Scanner: verifying fixed sample passes"
      if rg -n --pcre2 "(?i)([A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}|Bearer\s+[A-Z0-9._~+\/-]+|\b\d{3}-\d{2}-\d{4}\b|customerId)" src/SafeApi; then
        echo "Safe sample still contains blocked logging patterns."
        exit 1
      fi
      echo "Cerbi Scanner passed fixed logging sample."
    displayName: Cerbi Scanner source governance
