schemaVersion: 2026-06-cerbi-demo
policyId: cerbi-demo-source-log-governance
enforcementMode: block
rules:
  - id: PII.EMAIL.VALUE
    dataClass: direct_identifier
    description: Email addresses must not be written to application logs.
    severity: high
    action: block
    matchType: field-value
    pattern: '[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}'
    evidence: Email-like value detected in a structured log property.
    risk: Direct identifiers in logs can expose personal data to support, analytics, and retention systems that do not need it.
    recommendation: Log a stable internal customer reference, not an email address.
    developerAction: Replace customerEmail with customerRef or userId generated by the application.
  - id: AUTH.BEARER_TOKEN.FIELD_OR_VALUE
    dataClass: credential
    description: Authorization headers, bearer tokens, and access token fields must not be written to application logs.
    severity: critical
    action: block
    matchType: field-name-or-value
    pattern: '(authorization|access[_-]?token|^token$|bearer\s+[A-Z0-9._~+\/-]+=*)'
    evidence: Credential-like field name or bearer token value detected.
    risk: Bearer tokens in logs can allow account takeover or unauthorized API access until the token expires or is revoked.
    recommendation: Log tokenPresent=true or a short one-way hash prefix generated outside the logging path.
    developerAction: Remove token fields and log tokenPresent=true if support needs to know a token existed.
  - id: PII.SSN.VALUE
    dataClass: national_identifier
    description: SSN-like values must not be written to application logs.
    severity: critical
    action: block
    matchType: field-value
    pattern: '\b\d{3}-\d{2}-\d{4}\b'
    evidence: SSN-like value detected in a structured log property.
    risk: National identifiers in logs create high-impact privacy exposure and retention risk.
    recommendation: Log ssnPresent=true only when absolutely needed.
    developerAction: Remove ssnLastKnownValue and keep non-sensitive verification state.
  - id: PII.CUSTOMER_ID.FIELD
    dataClass: customer_identifier
    description: Raw customer identifiers must not be written to application logs.
    severity: medium
    action: block
    matchType: field-name
    pattern: '^(customerId|customerID)$'
    evidence: Raw customer identifier field detected.
    risk: Customer IDs can become linkable identifiers across operational tools and long-retention log stores.
    recommendation: Log a scoped customerRef or tenant-safe correlation key.
    developerAction: Replace customerId with customerRef.
